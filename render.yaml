services:
  - type: web
    name: logicrate-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PRODUCTION_MODEL_NAME
        value: "gemini-1.5-flash"
      - key: SUPER_ADMIN_EMAIL
        value: "sanjeevinick09@gmail.com"
